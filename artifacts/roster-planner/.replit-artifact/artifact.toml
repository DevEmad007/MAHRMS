kind = "web"
previewPath = "/"
title = "Multi-Shop Roster Planner"
version = "1.0.0"
id = "artifacts/roster-planner"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21645

[services.development]
run = "pnpm --filter @workspace/roster-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roster-planner", "run", "build" ]
serve = "static"
publicDir = "artifacts/roster-planner/out"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21645"
BASE_PATH = "/"
